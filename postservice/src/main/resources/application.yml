spring:
  application:
    name: apigateway

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        user_ban_channel:
          name: user_ban
        notification_like_channel:
          name: notification_like_channel

  mvc:
    servlet:
      path: /api/v1

server:
  port: 8081

  authservice:
    host: localhost
    port: 9090

  logging:
    level:
      root: info


security:
  basic:
    enable: false

