spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: Postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master-userservice.yaml

  data:
    redis:
      port: 6379
      host: localhost

    kafka:
      port: 6767
      host: localhost

    channels:
      user_ban_channel:
        name: user_ban
      profile_search_channel:
        name: profile_search_channel
      profile_view_channel:
        name: profile_view_channel


  profiles:
    active: test
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8090
  servlet:
    context-path: /api/v1

logging:
  level:
    root: info

aws:
  accessKey: access_key
  secretKey: secret_key
  region: bucket_region


spring.servlet.multipart.max-file-size: 10KB

dicebear:
  pic-base-url-small: https://api.dicebear.com/7.x/bottts/svg?size=64&seed=
  pic-base-url: https://api.dicebear.com/7.x/bottts/svg?size=256&seed=

randomAvatar:
  url: https://api.dicebear.com/8.x/pixel-art/jpg?seed=

executorConfig:
  thread-pool-size: 10