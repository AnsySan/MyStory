spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: Postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master-notificationservice.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        notification_like_channel:
          name: notification_like_channel
        comment_event_channel:
          name: comment_event_channel

    kafka:
      port: 8090
      host: localhost
      group-id: notification_service

    channel:
      profile-view:
        name: profile_view_channel

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com #https://www.baeldung.com/spring-email
    password: whatever
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            connectiontimeout: 5000
            timeout: 5000
            writetimeout: 5000

  messages:
    basename: messages

server:
  port: 8083

logging:
  level:
    root: info

vonage: #https://dashboard.nexmo.com/getting-started/sms
  api:
    key: whatever
    secret: whatever
  from: Basilisk

user-service:
  host: localhost
  port: 8080

telegram-bot:
  name: CorporationXEventAlertBot
  token: ssd

commentEvent:
  comment: comment.new

